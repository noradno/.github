name: Deploy Backend Reusable Workflow

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'The directory where the dotnet commands will be run'
        required: false
        type: string
        default: '.'
      dotnet-build-version:
        description: 'The .NET version to use during the build process'
        required: false
        type: string
        default: '10.0.300'
      dotnet-runtime-version:
        description: 'The .NET version to use for the app runtime in Azure App Service'
        required: false
        type: string
        default: 'DOTNETCORE|10.0'
      authenticate-to-nuget:
        description: 'Whether to authenticate to the private GitHub NuGet registry'
        required: false
        type: boolean
        default: true
      reset_database:
        description: 'Drop and recreate database from scratch'
        required: false
        type: boolean
        default: false
      environment-name:
        description: 'The name of the environment to deploy to'
        required: true
        type: string
    secrets:
      TOKEN:
        description: 'Github Token for authenticating to the private NuGet registry'
        required: true

env:
  PUBLISH_DIRECTORY: publish

permissions:
  id-token: write
  contents: read
  packages: read

jobs:
  build-and-deploy:
    name: Deploy to ${{ inputs.environment-name }}
    runs-on: norad-gh-runner-granma
    environment:
      name: ${{ inputs.environment-name }}
    concurrency:
      group: deploy-${{ inputs.environment-name }}
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET and authenticate to private NuGet registry
        if: inputs.authenticate-to-nuget == true
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-build-version }}
          source-url: https://nuget.pkg.github.com/noradno/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.TOKEN }}

      - name: Set up .NET
        if: inputs.authenticate-to-nuget == false
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-build-version }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Publish
        run: dotnet publish src/Presentation/Presentation.csproj --configuration Release --output ${{ env.PUBLISH_DIRECTORY }}

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.4.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service runtime
        env:
          DOTNET_RUNTIME_VERSION: ${{ inputs.dotnet-runtime-version }}
        run: |
          az webapp config set \
            --resource-group ${{ vars.RESOURCE_GROUP_NAME }} \
            --name ${{ vars.APP_NAME }} \
            --linux-fx-version "$DOTNET_RUNTIME_VERSION"

      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --resource-group ${{ vars.RESOURCE_GROUP_NAME }} \
            --name ${{ vars.APP_NAME }} \
            --settings \
            "ConnectionStrings__DefaultConnection=${{ vars.SQL_CONNECTION_STRING }}" \
            "ServiceBus__FullyQualifiedNamespace=${{ vars.SERVICE_BUS_NAMESPACE }}" \
            "ServiceBus__TopicName=${{ vars.SERVICE_BUS_TOPIC }}" \
            "ASPNETCORE_ENVIRONMENT=${{ vars.ASPNETCORE_ENVIRONMENT }}"

      - name: Enable database reset flag
        if: inputs.reset_database == true
        run: |
          az webapp config appsettings set \
            --resource-group ${{ vars.RESOURCE_GROUP_NAME }} \
            --name ${{ vars.APP_NAME }} \
            --settings "Database__Reset=true"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@657f0700ea5214d56a0400d8ac5e8023c963d25d # v3.0.2
        with:
          app-name: ${{ vars.APP_NAME }}
          package: ${{ env.PUBLISH_DIRECTORY }}

      - name: Clear database reset flag
        # Always run this step, even if the deployment is cancelled
        # Source: https://stackoverflow.com/questions/58858429/how-to-run-a-github-actions-step-even-if-the-previous-step-fails-while-still-f
        if: inputs.reset_database == true && always()
        run: |
          az webapp config appsettings set \
            --resource-group ${{ vars.RESOURCE_GROUP_NAME }} \
            --name ${{ vars.APP_NAME }} \
            --settings "Database__Reset=false"
