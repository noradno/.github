name: Build and Test Reusable Workflow

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'The directory where the dotnet commands will be run'
        required: false
        type: string
        default: '.'
      dotnet-build-version:
        description: 'The .NET version to use'
        required: false
        type: string
        default: '10.0.300'
      authenticate-to-nuget:
        description: 'Whether to authenticate to the private GitHub NuGet registry'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: read

jobs:
  build-and-test:
    timeout-minutes: 30
    name: Build and Test .NET
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up .NET and authenticate to private NuGet registry
        if: inputs.authenticate-to-nuget == true
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ inputs.dotnet-build-version }}
          source-url: https://nuget.pkg.github.com/noradno/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET
        if: inputs.authenticate-to-nuget == false
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ inputs.dotnet-build-version }}

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore, Build, and Test
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory "TestResults"

      - name: Set artifact name
        id: set_name
        env:
          DOTNET_BUILD_VERSION: ${{ inputs.dotnet-build-version }}
        run: echo "artifact_name=test-results-$(echo "$DOTNET_BUILD_VERSION" | sed 's/\./-/g')" >> $GITHUB_OUTPUT

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.set_name.outputs.artifact_name }}
          path: TestResults/
