name: Publish to GitHub Packages Reusable Workflow

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: false
        type: string
        default: '9.0.x'
      package-name:
        description: 'The name of the package'
        required: true
        type: string
      project-path:
        description: 'The path to the project'
        required: false
        type: string
        default: '.'

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.project-path }}

      - name: Build project
        run: dotnet build ${{ inputs.project-path }} --configuration Release

      - name: Run tests
        run: dotnet test ${{ inputs.project-path }} --configuration Release --no-build

      - name: Pack NuGet package
        run: dotnet pack ${{ inputs.project-path }} --configuration Release --output .

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./*.nupkg

      - name: Push to GitHub Packages
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push "${{ inputs.package-name }}.*.nupkg" --source "https://nuget.pkg.github.com/noradno/index.json" --api-key "${{ env.NUGET_AUTH_TOKEN }}" --skip-duplicate